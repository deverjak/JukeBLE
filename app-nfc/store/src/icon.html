<!doctype html>
<html><head><meta charset="utf-8" />
<style> html,body{margin:0;padding:0;background:#15121f} svg{display:block} </style>
</head><body>
<!-- Google Play hi-res icon — 512×512, full-bleed (Play applies its own rounded mask) -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#241e3a" />
      <stop offset="1" stop-color="#15121f" />
    </linearGradient>
    <linearGradient id="card" x1="20" y1="16" x2="96" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b6bf8" />
      <stop offset="1" stop-color="#6c4cf1" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />

  <!-- brand mark (0–120 space) scaled up and centred -->
  <g transform="translate(58,58) scale(3.3)">
    <rect x="20" y="20" width="68" height="84" rx="18" transform="rotate(-7 54 62)" fill="url(#card)" />
    <rect x="20" y="20" width="68" height="84" rx="18" transform="rotate(-7 54 62)" fill="#000" opacity="0.06" style="mix-blend-mode:multiply" />
    <path d="M44 47l21 14-21 14z" transform="rotate(-7 54 62)" fill="#fff" />
    <g stroke="#ffc23d" stroke-width="6" stroke-linecap="round" fill="none">
      <path d="M92 44a18 18 0 0 1 0 34" />
      <path d="M101 34a32 32 0 0 1 0 54" />
    </g>
  </g>
</svg>
</body></html>
